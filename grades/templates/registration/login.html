<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Iniciar Sesión | Mis Notas</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <style>
        :root {
            --primary: #4f46e5;
            --primary-light: #6366f1;
            --bg-body: #f8fafc;
            --text-main: #0f172a;
            --text-muted: #64748b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: var(--bg-body);
            background-image: radial-gradient(#e2e8f0 1.2px, transparent 1.2px);
            background-size: 40px 40px;
            color: var(--text-main);
            position: relative;
            overflow: hidden;
        }

        /* ---- CAPAS DE FONDO (WONDERLAND) ---- */
        .blob {
            position: absolute;
            border-radius: 50%;
            filter: blur(60px);
            z-index: 0;
            opacity: 0.45;
            animation: moveBlobs 25s infinite alternate ease-in-out;
            will-change: transform;
        }
        .blob-1 { width: 500px; height: 500px; background: rgba(79, 70, 229, 0.2); top: -15%; left: -10%; }
        .blob-2 { width: 450px; height: 450px; background: rgba(168, 85, 247, 0.15); bottom: -10%; right: -5%; animation-delay: -5s; }
        .blob-3 { width: 300px; height: 300px; background: rgba(14, 165, 233, 0.12); top: 30%; right: 15%; animation-delay: -10s; }

        @keyframes moveBlobs {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(40px, 60px) scale(1.15); }
            100% { transform: translate(-20px, 30px) scale(0.9); }
        }

        /* Decals Académicos (Flotantes) */
        .decal {
            position: absolute;
            color: var(--primary);
            opacity: 0.12;
            font-size: 5rem;
            z-index: 0;
            user-select: none;
            pointer-events: none;
            animation: floatDecal 12s infinite ease-in-out;
            will-change: transform;
        }
        .decal-1 { top: 15%; left: 20%; animation-delay: 0s; font-size: 6rem; }
        .decal-2 { top: 70%; left: 10%; animation-delay: -3s; transform: rotate(15deg); }
        .decal-3 { top: 20%; right: 10%; animation-delay: -6s; transform: rotate(-20deg); }
        .decal-4 { top: 80%; right: 25%; animation-delay: -9s; font-size: 4rem; }
        .decal-5 { top: 50%; left: 45%; opacity: 0.02; animation-duration: 18s; }

        @keyframes floatDecal {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-30px) rotate(10deg); }
        }

        /* Líneas de Luz Brillante */
        .light-streak {
            position: absolute;
            width: 1px;
            height: 100vh;
            background: linear-gradient(to bottom, transparent, rgba(79, 70, 229, 0.1), transparent);
            transform: rotate(35deg);
            z-index: 0;
            pointer-events: none;
            animation: streakMove 8s infinite linear;
        }
        .streak-1 { left: 30%; animation-delay: 0s; }
        .streak-2 { left: 60%; animation-delay: 4s; }

        @keyframes streakMove {
            from { transform: translateY(-100vh) rotate(35deg); }
            to { transform: translateY(100vh) rotate(35deg); }
        }

        /* ---- TARJETA DE LOGIN ---- */
        .login-container {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 1.5rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(15px);
            border-radius: 2.25rem;
            padding: 2.5rem 3.5rem;
            box-shadow: 
                0 30px 60px -12px rgba(0, 0, 0, 0.06),
                0 0 0 1px rgba(255, 255, 255, 0.8) inset;
            border: 1px solid #e2e8f0;
            animation: cardAppear 0.7s cubic-bezier(0.17, 0.84, 0.44, 1);
        }

        @keyframes cardAppear {
            from { opacity: 0; transform: translateY(40px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .login-header { text-align: center; margin-bottom: 2rem; }

        .login-icon {
            width: 75px; height: 75px;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            border-radius: 1.25rem;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 1.5rem;
            font-size: 2.25rem; color: white;
            box-shadow: 0 12px 24px rgba(79, 70, 229, 0.25);
            transform: rotate(-3deg);
        }

        .school-name {
            display: inline-block;
            margin-bottom: 1.25rem;
            font-weight: 800;
            color: var(--primary);
            background: rgba(79, 70, 229, 0.08);
            padding: 0.45rem 1.15rem;
            border-radius: 2.5rem;
            letter-spacing: 0.03em;
            text-transform: uppercase;
            font-size: 0.65rem;
            border: 1px solid rgba(79, 70, 229, 0.1);
        }

        .login-header h1 { font-size: 1.85rem; font-weight: 800; color: #0f172a; letter-spacing: -0.02em; margin-bottom: 0.4rem; }
        .login-header p { color: var(--text-muted); font-size: 0.95rem; font-weight: 500; }

        .form-group { margin-bottom: 1.35rem; }
        .form-group label {
            display: block; color: #475569; font-size: 0.75rem;
            font-weight: 700; margin-bottom: 0.6rem;
            text-transform: uppercase; letter-spacing: 0.06em; padding-left: 0.25rem;
        }

        .input-wrapper { position: relative; display: flex; align-items: center; }
        .input-wrapper i { position: absolute; left: 1.25rem; color: #94a3b8; font-size: 1rem; transition: color 0.3s; }

        .form-group input {
            width: 100%; padding: 0.9rem 1.25rem 0.9rem 3.25rem;
            background: #ffffff; border: 2px solid #f1f5f9;
            border-radius: 1.15rem; color: var(--text-main);
            font-family: 'Poppins', sans-serif; font-size: 1rem;
            font-weight: 500; transition: all 0.3s ease; outline: none;
        }
        .form-group input::placeholder { color: #cbd5e1; }
        .form-group input:focus { border-color: var(--primary); box-shadow: 0 12px 20px -5px rgba(79, 70, 229, 0.12); }
        .form-group input:focus + i { color: var(--primary); }

        .btn-login {
            width: 100%; padding: 1.1rem;
            background: linear-gradient(135deg, var(--primary), var(--primary-light));
            color: white; border: none; border-radius: 1.15rem;
            font-family: 'Poppins', sans-serif; font-size: 1.05rem;
            font-weight: 700; cursor: pointer; transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            margin-top: 1.25rem; display: flex; align-items: center;
            justify-content: center; gap: 12px;
            box-shadow: 0 12px 20px -5px rgba(79, 70, 229, 0.35);
        }
        .btn-login:hover { transform: translateY(-4px); box-shadow: 0 25px 30px -10px rgba(79, 70, 229, 0.45); filter: brightness(1.1); }
        .btn-login:active { transform: translateY(-1px); }

        .footer-text { text-align: center; margin-top: 2rem; color: var(--text-muted); font-size: 0.875rem; font-weight: 500; }
        .footer-text a { color: var(--primary); text-decoration: none; font-weight: 700; transition: color 0.3s; }
        .footer-text a:hover { color: var(--primary-light); text-decoration: underline; }

        /* Toast Moderno */
        .toastify {
            border-radius: 1rem;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            padding: 1rem 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        @media (max-width: 480px) { .login-card { padding: 2.25rem 1.75rem; } }
    </style>
</head>
<body>
    <!-- Capas de Fondo Dinámicas -->
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
    <div class="blob blob-3"></div>

    <div class="light-streak streak-1"></div>
    <div class="light-streak streak-2"></div>

    <i class="fa-solid fa-book decal decal-1"></i>
    <i class="fa-solid fa-graduation-cap decal decal-2"></i>
    <i class="fa-solid fa-pencil decal decal-3"></i>
    <i class="fa-solid fa-flask decal decal-4"></i>
    <i class="fa-solid fa-calculator decal decal-5"></i>

    <div class="login-container">
        <div class="login-card">
            <div class="login-header">
                <div class="login-icon">
                    <i class="fa-solid fa-shield-halved"></i>
                </div>
                <span class="school-name">U.E. Julio Viteri Gamboa</span>
                <h1>Bienvenido</h1>
                <p>Ingresa tus credenciales de acceso</p>
            </div>

            <form method="post" id="login-form">
                {% csrf_token %}
                <div class="form-group">
                    <label for="id_username">Usuario</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-user"></i>
                        <input type="text" name="username" id="id_username" placeholder="Nombre de usuario" autofocus required>
                    </div>
                </div>
                <div class="form-group">
                    <label for="id_password">Contraseña</label>
                    <div class="input-wrapper">
                        <i class="fa-solid fa-lock"></i>
                        <input type="password" name="password" id="id_password" placeholder="Tu contraseña" required>
                    </div>
                </div>
                
                <button type="submit" class="btn-login" id="btn-login">
                    <span>Entrar al Sistema</span>
                    <i class="fa-solid fa-right-to-bracket"></i>
                </button>
            </form>

            <div class="footer-text">
                ¿No tienes una cuenta? <a href="{% url 'register' %}">Solicitar Acceso</a>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script>
        function showToast(text, type = "success") {
            let bg = "linear-gradient(to right, #10b981, #34d399)";
            if (type === "error" || type === "danger") bg = "linear-gradient(to right, #ef4444, #f87171)";
            
            Toastify({
                text: text,
                duration: 5000,
                close: true,
                gravity: "top",
                position: "right",
                style: { background: bg }
            }).showToast();
        }

        // Catch Django errors and show them as toasts with a small delay for performance
        {% if form.errors %}
            setTimeout(() => {
                showToast("Usuario o contraseña incorrectos.", "error");
            }, 300);
        {% endif %}

        document.getElementById('login-form').addEventListener('submit', function() {
            const btn = document.getElementById('btn-login');
            btn.innerHTML = '<span>Verificando...</span> <i class="fa-solid fa-circle-notch fa-spin"></i>';
            btn.style.pointerEvents = 'none';
        });
    </script>
</body>
</html>
